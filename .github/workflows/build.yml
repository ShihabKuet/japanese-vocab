# ─────────────────────────────────────────────────────────────────
#  Japanese Vocab — Build & Release Workflow
#
#  Triggered on every push to `master`.
#
#  What it does:
#    1. Builds the Vite/React web app
#    2. Syncs it into the Capacitor Android project
#    3. Compiles & signs a release APK
#    4. Creates/updates a GitHub Release with the APK attached
#
#  Vercel deployment is handled separately and automatically
#  via the Vercel GitHub integration (no action needed here).
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    KEYSTORE_BASE64   — base64-encoded .jks signing keystore
#    KEY_ALIAS         — key alias inside the keystore
#    KEY_PASSWORD      — password for the key
#    STORE_PASSWORD    — password for the keystore file
#
#  A new GitHub Release is only created when the version in
#  package.json is bumped. Pushing without a version bump
#  still builds but skips the release step.
# ─────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:   # also allows manual trigger from GitHub UI

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1 — Build web assets
  # ─────────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_GITHUB_REPO: ${{ github.repository }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1


  # ─────────────────────────────────────────────────────────────
  #  JOB 2 — Build & sign Android APK
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: build-web      # wait for web build to finish first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync Capacitor (copy web assets → android/app/src/main/assets)
        run: npx cap sync android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Install Android SDK 35 (required by Capacitor v7)
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_HOME
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Sign release APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias:            ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword:      ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.0'

      - name: Rename APK to friendly name
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" \
             "japanese-vocab-v${VERSION}.apk"
          echo "APK_PATH=japanese-vocab-v${VERSION}.apk" >> $GITHUB_ENV
          echo "APP_VERSION=v${VERSION}" >> $GITHUB_ENV

      # ── Only create a release when the version tag is new ──
      - name: Check if release tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin \
               | grep -q "refs/tags/${{ env.APP_VERSION }}$"; then
            echo "EXISTS=true"  >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ env.APP_VERSION }}
          name:       Japanese Vocab ${{ env.APP_VERSION }}
          make_latest: true
          body: |
            ## 🇯🇵 Japanese Vocabulary App ${{ env.APP_VERSION }}

            ### 📱 Install on Android
            1. Download **`${{ env.APK_PATH }}`** below
            2. On your Android phone: **Settings → Security → Install unknown apps** → allow your browser
            3. Open the downloaded APK file to install
            4. Future updates will notify you inside the app automatically

            ### 🌐 Web App
            Always up to date — open your Vercel URL in any browser

            ---
            _Built automatically from commit `${{ github.sha }}`_
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release (version tag already exists)
        if: steps.check_tag.outputs.EXISTS == 'true'
        run: |
          echo "ℹ️  Tag ${{ env.APP_VERSION }} already exists."
          echo "    Bump the version in package.json to create a new release."
